name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run Lint 🛡️
        run: npm run lint  # Если тут будет ошибка, следующие шаги не запустятся!

      - name: Build
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          # token: ${{ secrets.GITHUB_TOKEN }}
          # commit_message: "Deploy to GitHub Pages"
          # target_branch: gh-pages
          # Если у вас есть кастомный домен, раскомментируйте следующую строку и добавьте имя вашего домена
          # cname: "your-custom-domain.com"